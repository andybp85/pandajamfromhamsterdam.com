<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta name="darkreader-lock"/>
    <meta content="Welcome to the archives for the PandaJAM from Hamsterdam, the weekly Wednesday Night Open Jam at Boulevard Bar &amp; Grill, Elmwood Park, NJ!" name="description">
    <meta content="PandaJAM from HamsterDAM" name="author">
    <meta content="#000000" name="theme-color">

    <title>PandaJAM from HamsterDAM</title>

    <link href="/css/styles.css" rel="stylesheet">

    <link href="/favicon.ico" rel="icon" sizes="16x16" type="image/x-icon">

    <script async data-id="101482004" src="https://static.getclicky.com/js"></script>
</head>

<body>

<div id="wrapper">

    <!-- Sidebar: jam list -->
    <nav id="sidebar-wrapper">
        <ul class="loading" id="jam_list">
            <li class="sidebar-brand">
                <h1>Jams</h1>
                <h2 id="loading-jams">Loading jams&hellip;</h2>
            </li>
        </ul>
    </nav>

    <!-- Page content -->
    <div id="page-content-wrapper">

        <div id="menu-row">
            <a class="btn" href="#menu-toggle" id="menu-toggle">Jams Archive</a>
        </div>

        <header id="inner_header">
            <a href="#">
                <h3 id="logo">
                    <span class="logo_space">&nbsp;</span>PandaJAM<span class="logo_space">&nbsp;</span>
                    <span id="logo_from">from</span><br>
                    HamsterDAM</h3>
            </a>
            <div id="info">
                <span class="bold">Thank You!</span><br>
                <span id="info_address">
                    We couldn't have<br>
                    done it without<br>
                    all of you!
                </span>
            </div>
            <!-- Shown under the logo once #info is dropped on narrow screens. -->
            <div id="thanks-below">Thank You!</div>
        </header>

        <main id="music_background">
            <div id="music_background_inner">
                <div id="jamplayer"></div>
                <div id="home_content">
                    <h2>Welcome to the Archives!</h2>
                    <p class="archive-link">
                        For the band, see <a href="https://archive.org/details/PandaJAM">PandaJAM on Archive.org</a>
                    </p>
                    <iframe
                        allowfullscreen
                        id="youtube"
                        src="https://www.youtube.com/embed/videoseries?list=PL6lC-uALf0Fsrqllucxx4nty1GWbXQpFI&rel=0"
                        title="PandaJAM YouTube playlist">
                    </iframe>
                </div>
                <div id="jamdeetz"></div>
            </div>
        </main>

    </div>

</div>

<footer>
    &copy;<span id="year"></span>
    PandaJAM from HamsterDAM
    <a href="https://clicky.com/101482004" title="GDPR-compliant Web Analytics">
        <img alt="Clicky" src="https://static.getclicky.com/media/links/badge.gif">
    </a>
</footer>

<script src="/js/main.js" type="module"></script>

</body>

</html>
